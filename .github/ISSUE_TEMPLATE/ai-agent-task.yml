name: AI Agent Task
description: Safe, scoped task for GPT, Claude, Copilot, or Claude Code
title: "[AI TASK] "
labels: ["ai-task", "needs-review"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Task goal
      description: What should the AI help with?
    validations:
      required: true

  - type: textarea
    id: repo-area
    attributes:
      label: Repo area
      description: Which area of the repo is involved?
      placeholder: "Example: swarm page, arena worker, GitHub Actions, docs"
    validations:
      required: true

  - type: textarea
    id: allowed-files
    attributes:
      label: Files allowed to change
      description: List files or directories the agent may touch.
    validations:
      required: false

  - type: textarea
    id: forbidden-files
    attributes:
      label: Files/directories forbidden to touch
      description: List sealed, private, or out-of-scope files.
      value: |
        - public/js/emery.js
        - public/css/emery.css
        - private docs
        - ai-relay content
        - secrets/env files
    validations:
      required: true

  - type: checkboxes
    id: safety
    attributes:
      label: Safety constraints
      options:
        - label: No secrets, tokens, API keys, or credentials
          required: true
        - label: No sealed/private files
          required: true
        - label: No deploys without human approval
          required: true
        - label: No fake metrics, fake users, fake traffic, or fake analytics
          required: true
        - label: Keep changes scoped and reversible
          required: true

  - type: textarea
    id: validation
    attributes:
      label: Validation steps
      description: What checks should pass?
    validations:
      required: true

  - type: textarea
    id: review
    attributes:
      label: Human review requirements
      description: What must the human approve before merge/deploy?
    validations:
      required: true
