name: Deploy workers

on:
  push:
    branches: [main]
    paths:
      - 'workers/**'
      - 'wrangler.toml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: '20'

      - name: Install wrangler
        run: npm install -g wrangler@4

      - name: Deploy workers (per env)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          for env in helper audit ops arena-llm cf-ai seo-copilot forum-bridge atlas-rescuer; do
            echo "Deploying env: $env"
            wrangler deploy --env "$env" || echo "(env $env failed or not configured — continuing)"
          done
