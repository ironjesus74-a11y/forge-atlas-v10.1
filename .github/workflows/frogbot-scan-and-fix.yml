name: Frogbot Repository Scan

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 1" # weekly, Monday 04:17 UTC

permissions:
  contents: read

concurrency:
  group: frogbot-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  frogbot-repo-scan:
    name: Scheduled/manual repo scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
      security-events: write

    steps:
      - name: Checkout default branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run Frogbot on repository
        uses: jfrog/frogbot@a2e5edb22925b75bda6847bb46b75e4015cc38db # v2
        env:
          JF_URL: ${{ secrets.JF_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
          JF_GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JF_GIT_PROVIDER: github
          JF_GIT_OWNER: ${{ github.repository_owner }}
          JF_GIT_REPO: ${{ github.event.repository.name }}
          JF_GIT_BASE_BRANCH: main
          JF_WORKING_DIR: .
          JF_FAIL: "true"
