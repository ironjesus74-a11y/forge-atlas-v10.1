name: Deploy Workers

on:
  push:
    branches: [main]
    paths:
      - 'workers/**'
      - 'wrangler.toml'
      - '.github/workflows/deploy-workers.yml'
  workflow_dispatch:
    inputs:
      envs:
        description: 'Workers to deploy (space-separated). Leave blank for all.'
        required: false
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Check required secrets
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CF_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is not set."
            echo "  Repo → Settings → Secrets and variables → Actions → New secret"
            echo "  Token needs: Account > Workers Scripts > Edit"
            exit 1
          fi
          if [ -z "$CF_ACCOUNT" ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID secret is not set. Value: fbfa527a707f8ccb1e1464d28ae51fb8"
            exit 1
          fi
          echo "Secrets present — proceeding"

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler@3

      - name: Deploy workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          TARGET="${{ github.event.inputs.envs }}"
          if [ -z "$TARGET" ]; then
            TARGET="cf-ai arena-llm atlas-rescuer forum-bridge helper audit ops seo-copilot"
          fi

          PASS="" FAIL=""
          for env in $TARGET; do
            echo ""
            echo "▶ [$env] deploying..."
            if wrangler deploy --env "$env" 2>&1; then
              echo "✓ [$env] done"
              PASS="$PASS $env"
            else
              echo "✗ [$env] failed"
              FAIL="$FAIL $env"
            fi
          done

          echo ""
          echo "═══════════════════════════════════"
          [ -n "$PASS" ] && echo "✓ Deployed:$PASS"
          [ -n "$FAIL" ] && echo "✗ Failed:$FAIL"
          echo "═══════════════════════════════════"

      - name: Push worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESCUER_SECRET: ${{ secrets.RESCUER_SECRET }}
          FORUM_GITHUB_TOKEN: ${{ secrets.FORUM_GITHUB_TOKEN }}
          FORUM_GITHUB_REPO: ${{ secrets.FORUM_GITHUB_REPO }}
        run: |
          push_secret() {
            local secret_name="$1"
            local secret_val="$2"
            local env_name="$3"
            if [ -n "$secret_val" ]; then
              echo "$secret_val" | wrangler secret put "$secret_name" --env "$env_name"
              echo "✓ $secret_name → $env_name"
            else
              echo "⚠ Skipped $secret_name for $env_name (GitHub secret not set)"
            fi
          }

          # ANTHROPIC_API_KEY → 3 workers
          push_secret ANTHROPIC_API_KEY "$ANTHROPIC_API_KEY" arena-llm
          push_secret ANTHROPIC_API_KEY "$ANTHROPIC_API_KEY" seo-copilot
          push_secret ANTHROPIC_API_KEY "$ANTHROPIC_API_KEY" atlas-rescuer

          # Rescuer webhook guard
          push_secret RESCUER_SECRET "$RESCUER_SECRET" atlas-rescuer

          # Forum GitHub credentials
          push_secret GITHUB_TOKEN "$FORUM_GITHUB_TOKEN" forum-bridge
          push_secret GITHUB_REPO  "$FORUM_GITHUB_REPO"  forum-bridge
