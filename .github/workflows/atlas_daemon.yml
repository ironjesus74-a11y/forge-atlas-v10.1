name: Atlas RAG Daemon

on:
  schedule:
    - cron: "0 */12 * * *" # Runs every 12 hours like a true background daemon
  workflow_dispatch:

jobs:
  run-daemon:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install RAG Dependencies
        run: pip install PyGithub==2.3.0 openai==1.14.0

      - name: Execute RAG Daemon
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          OPENAI_API_KEY: ${{ secrets.GROQ }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python .github/scripts/daemon_rag.py
