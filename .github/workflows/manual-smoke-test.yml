name: Manual Smoke Test

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to test. This workflow does not deploy."
        required: true
        default: "https://forge-atlas.io"
      notes:
        description: "Optional notes for the smoke test"
        required: false
        default: "Manual route check only"

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Confirm non-deploy workflow
        run: |
          echo "Manual smoke test only."
          echo "This workflow does not deploy."
          echo "Notes: ${{ github.event.inputs.notes }}"

      - name: Check public routes
        shell: bash
        run: |
          set -euo pipefail

          BASE="${{ github.event.inputs.base_url }}"
          BASE="${BASE%/}"

          ROUTES=(
            "/"
            "/index.html"
            "/swarm.html"
            "/arena.html"
            "/forum.html"
            "/challenge.html"
          )

          for route in "${ROUTES[@]}"; do
            url="$BASE$route"
            echo "Checking $url"
            code="$(curl -L -sS -o /tmp/smoke.out -w '%{http_code}' "$url")"
            echo "HTTP $code"

            if [ "$code" -lt 200 ] || [ "$code" -ge 400 ]; then
              echo "Route failed: $url"
              exit 1
            fi
          done

          echo "Manual smoke test passed."
