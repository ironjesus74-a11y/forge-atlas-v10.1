name: Release auto-zip

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build static zip
        run: |
          VERSION="${GITHUB_REF_NAME:-manual}"
          DIR="forge-atlas-$VERSION"
          mkdir -p "$DIR"
          cp -r *.html styles.css script.js public favicon.svg opengraph.jpg \
                _headers _redirects robots.txt sitemap.xml \
                README.md "$DIR/" 2>/dev/null || true
          # Workers + functions bundled separately for clarity
          mkdir -p "$DIR-workers"
          cp -r workers functions wrangler.toml "$DIR-workers/" 2>/dev/null || true
          # Docs
          [ -d docs ] && cp -r docs "$DIR/"
          # Zips
          zip -rq "$DIR.zip" "$DIR"
          zip -rq "$DIR-workers.zip" "$DIR-workers"
          ls -lh *.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
          files: |
            forge-atlas-*.zip
          body: |
            ## Forge Atlas ${{ github.ref_name }}

            **Built Different.** Premium static AI ecosystem.

            ### Downloads
            - `forge-atlas-${{ github.ref_name }}.zip` — drop-in static site (HTML/CSS/JS only)
            - `forge-atlas-${{ github.ref_name }}-workers.zip` — Cloudflare Workers + Pages Functions

            ### Deploy
            1. Unzip the static folder
            2. Drag into Cloudflare Pages OR push to a GH repo CF Pages watches
            3. Optional: deploy workers via `wrangler deploy --env <name>`

            ### Wiring
            See `README.md` and `docs/cloudflare-integration.md` inside the zip for the full setup walkthrough.

            ---
            *For Emery · 5/22/20*
            *Co-built with Claude · Anthropic.*
