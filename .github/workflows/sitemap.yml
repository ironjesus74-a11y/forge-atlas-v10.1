name: Sitemap regen

on:
  push:
    branches: [main]
    paths:
      - '*.html'
  workflow_dispatch:

jobs:
  regen:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Regenerate sitemap.xml
        run: |
          DOMAIN="${SITE_URL:-https://forge-atlas.io}"
          LASTMOD=$(date -u +'%Y-%m-%d')
          {
            echo '<?xml version="1.0" encoding="UTF-8"?>'
            echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">'
            for f in $(ls *.html | sort); do
              name="${f%.html}"
              if [ "$name" = "index" ]; then
                loc="$DOMAIN/"
                priority="1.0"
              else
                loc="$DOMAIN/$f"
                priority="0.8"
              fi
              echo "  <url>"
              echo "    <loc>$loc</loc>"
              echo "    <lastmod>$LASTMOD</lastmod>"
              echo "    <priority>$priority</priority>"
              echo "    <changefreq>weekly</changefreq>"
              echo "  </url>"
            done
            echo '</urlset>'
          } > sitemap.xml
          echo "Generated sitemap.xml with $(grep -c '<url>' sitemap.xml) entries"

      - name: Commit if changed
        run: |
          if git diff --quiet sitemap.xml; then
            echo "No sitemap changes"
          else
            git config user.name "forge-atlas-bot"
            git config user.email "bot@forge-atlas.io"
            git add sitemap.xml
            git commit -m "chore(sitemap): auto-regenerate [skip ci]"
            git push
          fi
        env:
          SITE_URL: ${{ vars.SITE_URL }}
