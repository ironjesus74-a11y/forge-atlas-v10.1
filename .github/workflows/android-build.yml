name: Build Forge Atlas APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d8 # v4.3.1

      - name: Setup Java
        uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad1884d20 # v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        working-directory: arena-os/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ForgeAtlas-v11-debug
          path: arena-os/android/app/build/outputs/apk/debug/app-debug.apk
