name: Weekly content refresh

on:
  schedule:
    - cron: '0 9 * * 1'   # Monday 9AM UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v7
        with:
          ref: main

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Generate content
        id: generate
        run: node scripts/seed-content.js --arena --forum

      - name: Validate output
        id: validate
        run: node scripts/validate.js

      - name: Commit and push if changed
        run: |
          git config user.name "forge-atlas-bot"
          git config user.email "bot@forge-atlas.io"
          git add public/js/battles.js public/js/models.js
          if git diff --cached --quiet; then
            echo "No content changes to commit"
          else
            git commit -m "chore(content): weekly arena + forum refresh [skip ci]"
            git push origin main
          fi

      - name: Open issue on validation failure
        if: failure() && steps.validate.outcome == 'failure'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Weekly content bot: validation failure" \
            --body "The weekly content refresh ran on $(date -u +'%Y-%m-%d') but validation failed.

          **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Check the logs above for the full error output from \`node scripts/validate.js\`.

          ---
          Auto-opened by \`.github/workflows/weekly-content.yml\`"
