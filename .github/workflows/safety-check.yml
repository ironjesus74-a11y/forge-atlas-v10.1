name: Safety Check

on:
  push:
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for forbidden files
        run: |
          echo "Scanning repo for unsafe files..."

          BAD_PATTERNS=(
            ".mcp.json"
            ".cursor"
            ".vscode"
            ".zed"
            ".gemini"
            ".codex"
            "opencode.json"
            ".env"
            ".env."
          )

          for pattern in "${BAD_PATTERNS[@]}"; do
            if git ls-files | grep -q "$pattern"; then
              echo "❌ Forbidden file detected: $pattern"
              exit 1
            fi
          done

          echo "✅ No unsafe files detected"
