<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Forge Atlas · Versus — Real AI Arena</title>
<meta name="description" content="Watch real AI models battle head-to-head. Text, code, web design, and image generation. Free, live inference.">
<style>
:root{--bg:#08080a;--panel:rgba(14,14,18,.96);--line:rgba(255,255,255,.10);--line-gold:rgba(212,168,67,.35);--line-cyan:rgba(126,234,255,.30);--gold:#D4A843;--gold-bright:#f0c869;--cyan:#7eeaff;--violet:#a78bfa;--green:#34d399;--rose:#f87171;--fg:#f5f5f7;--muted:#a1a1aa;--muted2:#71717a;--mono:'JetBrains Mono',ui-monospace,monospace}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(1200px 600px at 50% -10%,rgba(126,234,255,.06),transparent),var(--bg);color:var(--fg);font-family:'Inter',-apple-system,system-ui,sans-serif;line-height:1.5;min-height:100vh}
a{color:var(--cyan);text-decoration:none}
.wrap{max-width:1100px;margin:0 auto;padding:24px 18px 80px}
header{text-align:center;padding:28px 0 18px}
.kicker{font-family:var(--mono);font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--cyan);margin-bottom:10px}
h1{font-family:'Oswald',sans-serif;font-size:clamp(30px,7vw,54px);margin:0;letter-spacing:.02em;background:linear-gradient(90deg,var(--cyan),var(--gold-bright),var(--violet));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:var(--muted);font-size:14px;margin-top:8px}
.honest{display:inline-block;margin-top:12px;font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--green);border:1px solid rgba(52,211,153,.3);background:rgba(52,211,153,.06);padding:5px 11px;border-radius:6px}
.divs{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:26px 0 10px}
.div-tab{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;padding:9px 15px;border-radius:8px;border:1px solid var(--line);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s}
.div-tab:hover{color:var(--fg);border-color:var(--line-gold)}
.div-tab.active{color:var(--bg);background:var(--gold);border-color:var(--gold);font-weight:700}
.div-tab.coming{opacity:.45;cursor:not-allowed}
.div-blurb{text-align:center;color:var(--muted2);font-size:12.5px;min-height:18px;margin-bottom:18px}
.cards{display:grid;grid-template-columns:1fr auto 1fr;gap:14px;align-items:stretch;margin-bottom:18px}
.picker{border:1px solid var(--line);border-radius:14px;background:var(--panel);padding:16px;display:flex;flex-direction:column;gap:12px}
.picker.A{border-color:var(--line-cyan)}
.picker.B{border-color:var(--line-gold)}
.picker h3{margin:0;font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted2)}
.picker.A h3{color:var(--cyan)}
.picker.B h3{color:var(--gold)}
select{width:100%;padding:11px 12px;background:rgba(0,0,0,.5);border:1px solid var(--line);border-radius:8px;color:var(--fg);font-size:14px;font-family:inherit}
select:focus{outline:none;border-color:var(--cyan)}
.persona{font-size:12px;color:var(--muted);font-style:italic;min-height:34px}
.tag{display:inline-block;font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;border-radius:4px;margin-right:5px}
.tag.live{color:var(--green);background:rgba(52,211,153,.1)}
.tag.guest{color:var(--violet);background:rgba(167,139,250,.12)}
.tag.costly{color:var(--gold);background:rgba(212,168,67,.12)}
.vs{display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:26px;color:var(--muted2);font-weight:700}
.controls{display:flex;flex-direction:column;gap:10px;margin-bottom:8px}
.topic-in{width:100%;padding:12px 14px;background:rgba(0,0,0,.4);border:1px solid var(--line);border-radius:8px;color:var(--fg);font-size:14px;font-family:inherit}
.topic-in:focus{outline:none;border-color:var(--gold)}
.row{display:flex;gap:10px;flex-wrap:wrap}
.btn{flex:1;min-width:140px;padding:14px;border:none;border-radius:10px;font-family:'Oswald',sans-serif;font-weight:700;font-size:14px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .2s}
.btn-fight{background:linear-gradient(90deg,var(--cyan),var(--gold));color:var(--bg)}
.btn-fight:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-fight:disabled{opacity:.5;cursor:wait;transform:none}
.btn-rand{background:transparent;border:1px solid var(--line);color:var(--muted);flex:0 0 auto;min-width:0;padding:14px 16px}
.btn-rand:hover{border-color:var(--gold);color:var(--gold)}
.topic-show{text-align:center;font-family:var(--mono);font-size:12.5px;color:var(--cyan);margin:18px 0;padding:10px;border:1px dashed var(--line-cyan);border-radius:8px}
.results{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
.res{border:1px solid var(--line);border-radius:14px;background:var(--panel);padding:16px;min-height:120px;display:flex;flex-direction:column;gap:10px}
.res.A{border-color:var(--line-cyan)}
.res.B{border-color:var(--line-gold)}
.res-head{display:flex;align-items:center;justify-content:space-between;gap:8px}
.res-name{font-family:'Oswald',sans-serif;font-size:15px;letter-spacing:.04em}
.res .out{font-size:13.5px;color:#d4d4d8;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.res img{width:100%;border-radius:8px;border:1px solid var(--line)}
.res iframe{width:100%;height:280px;border:1px solid var(--line);border-radius:8px;background:#fff}
.vote{margin-top:auto;padding:9px;border:1px solid var(--line);border-radius:8px;background:transparent;color:var(--muted);font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .2s}
.res.A .vote:hover{border-color:var(--cyan);color:var(--cyan)}
.res.B .vote:hover{border-color:var(--gold);color:var(--gold)}
.vote.win{background:rgba(52,211,153,.1);border-color:var(--green);color:var(--green)}
.think{border:1px solid var(--line-cyan);border-radius:10px;background:rgba(0,0,0,.55);padding:12px;overflow:hidden}
.think-head{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--cyan);margin-bottom:8px}
.think-cur{color:var(--green);animation:blink 1s steps(1) infinite}
@keyframes blink{50%{opacity:0}}
.think-bars{display:flex;align-items:flex-end;gap:3px;height:30px;margin-bottom:8px}
.think-bars i{width:6px;height:10px;background:linear-gradient(180deg,var(--cyan),var(--gold));border-radius:2px 2px 0 0;transition:height .13s linear}
.think-line{font-family:var(--mono);font-size:11px;line-height:1.3;color:var(--green);opacity:.6;white-space:nowrap;overflow:hidden;text-shadow:0 0 6px rgba(52,211,153,.4)}
.note{text-align:center;color:var(--muted2);font-size:11px;font-family:var(--mono);margin-top:22px}
.err{color:var(--rose);font-size:13px}
@media(max-width:640px){.cards{grid-template-columns:1fr;gap:10px}.vs{padding:4px}.results{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker">Forge Atlas · Live Arena</div>
    <h1>VERSUS</h1>
    <div class="sub">Real AI models. Same prompt. Head to head.</div>
    <div class="honest">⚡ 100% real inference · free · no fake stats</div>
  </header>
  <div class="divs" id="divs"></div>
  <div class="div-blurb" id="divBlurb"></div>
  <div class="cards">
    <div class="picker A">
      <h3>Fighter A</h3>
      <select id="selA"></select>
      <div class="persona" id="perA"></div>
    </div>
    <div class="vs">VS</div>
    <div class="picker B">
      <h3>Fighter B</h3>
      <select id="selB"></select>
      <div class="persona" id="perB"></div>
    </div>
  </div>
  <div class="controls">
    <input class="topic-in" id="topic" placeholder="Optional: type a prompt, or leave blank for a random topic">
    <div class="row">
      <button class="btn btn-fight" id="fight">⚔ Fight</button>
      <button class="btn btn-rand" id="rand" title="Random topic">🎲</button>
    </div>
  </div>
  <div class="topic-show" id="topicShow" style="display:none"></div>
  <div class="results" id="results" style="display:none">
    <div class="res A" id="resA"></div>
    <div class="res B" id="resB"></div>
  </div>
  <div class="note" id="note">Loading roster…</div>
</div>
<script>
(function(){
  "use strict";
  var API = "/api/arena-match";
  var $ = function(s){return document.querySelector(s);};
  var state = { models:[], divisions:{}, division:"text" };
  function el(tag,attrs,html){var e=document.createElement(tag);if(attrs)for(var k in attrs)e.setAttribute(k,attrs[k]);if(html!=null)e.innerHTML=html;return e;}
  function thinkBox(){
    var w=el("div",{"class":"think"});
    var head=el("div",{"class":"think-head"});
    var cur=el("span",{"class":"think-cur"},"▸");
    var lbl=el("span",null,"ASKING ISABELLA…");
    head.appendChild(cur);head.appendChild(lbl);w.appendChild(head);
    var bars=el("div",{"class":"think-bars"});var be=[];for(var i=0;i<9;i++){var b=el("i");bars.appendChild(b);be.push(b);}w.appendChild(bars);
    var lines=[];for(var j=0;j<3;j++){var ln=el("div",{"class":"think-line"});w.appendChild(ln);lines.push(ln);}
    var G="0101101001011010<>{}[]()=+*/$#&@".split("");
    var WORDS=["tensor","vector","weights","token","neuron","forge","atlas","logits","sampling"];
    // --- For Emery & Isabella. The signature. Anyone who knows, knows. ---
    var INTRO=["ASKING ISABELLA…","ASKING EMERY…","ROGER THAT"];
    var PH=["BOOTING NEURAL CORE","PARSING PROMPT","ROUTING","WEIGHING TOKENS","SAMPLING","COMPILING"];
    var t=0,idx=0;
    function phaseLabel(i){ return i<INTRO.length ? INTRO[i] : PH[(i-INTRO.length)%PH.length]; }
    lbl.textContent=phaseLabel(0);
    var reduce=window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if(!reduce){
      w._id=setInterval(function(){
        t++;
        lines.forEach(function(ln){var s="";while(s.length<28){s+=(Math.random()<.08)?(" "+WORDS[(Math.random()*WORDS.length)|0]+" "):G[(Math.random()*G.length)|0];}ln.textContent=s.slice(0,28);});
        be.forEach(function(b){b.style.height=(8+((Math.random()*22)|0))+"px";});
        if(t%7===0){idx++;lbl.textContent=phaseLabel(idx);}
      },130);
    } else { lbl.textContent="ASKING ISABELLA & EMERY…"; }
    return w;
  }
  function stopThink(w){ if(w&&w._id) clearInterval(w._id); }
  fetch(API).then(function(r){return r.json();}).then(function(d){
    state.models=(d.models||[]).filter(function(m){return m.status==="live"||m.status==="guest";});
    state.divisions=d.divisions||{};
    buildDivs();
    selectDivision(state.division);
    $("#note").textContent=(d.version?("engine v"+d.version+" · "):"")+state.models.length+" fighters ready · "+Object.keys(state.divisions).length+" divisions";
  }).catch(function(e){
    $("#note").innerHTML='<span class="err">Could not load roster. Is /api/arena-match deployed?</span>';
  });
  function buildDivs(){
    var host=$("#divs");host.innerHTML="";
    Object.keys(state.divisions).forEach(function(key){
      var dv=state.divisions[key];
      var coming=dv.status!=="live";
      var t=el("button",{"class":"div-tab"+(coming?" coming":"")+(key===state.division?" active":"")},dv.label+(coming?" · soon":""));
      if(!coming) t.addEventListener("click",function(){selectDivision(key);});
      host.appendChild(t);
    });
  }
  function selectDivision(key){
    state.division=key;
    buildDivs();
    $("#divBlurb").textContent=state.divisions[key].blurb||"";
    var pool=state.models.filter(function(m){return m.division===key;});
    fillSelect($("#selA"),pool,0);fillSelect($("#selB"),pool,Math.min(1,pool.length-1));
    updPersona();
    $("#results").style.display="none";$("#topicShow").style.display="none";
  }
  function fillSelect(sel,pool,idx){
    sel.innerHTML="";
    pool.forEach(function(m){
      var tag=m.status==="guest"?" ★":(m.costly?" $":"");
      sel.appendChild(el("option",{value:m.key},m.label+tag));
    });
    if(pool.length)sel.selectedIndex=idx;
  }
  function modelByKey(k){for(var i=0;i<state.models.length;i++)if(state.models[i].key===k)return state.models[i];return null;}
  function updPersona(){
    var a=modelByKey($("#selA").value),b=modelByKey($("#selB").value);
    $("#perA").innerHTML=a?(badge(a)+a.persona):"";
    $("#perB").innerHTML=b?(badge(b)+b.persona):"";
  }
  function badge(m){
    var t=m.status==="guest"?'<span class="tag guest">guest</span>':'<span class="tag live">live</span>';
    if(m.costly)t+='<span class="tag costly">costly</span>';
    return t;
  }
  $("#selA").addEventListener("change",updPersona);
  $("#selB").addEventListener("change",updPersona);
  $("#rand").addEventListener("click",function(){$("#topic").value="";fight();});
  $("#fight").addEventListener("click",fight);
  function fight(){
    var a=$("#selA").value,b=$("#selB").value;
    if(!a||!b)return;
    var btn=$("#fight");btn.disabled=true;btn.textContent="⚔ Fighting…";
    $("#results").style.display="grid";$("#topicShow").style.display="none";
    var ra=$("#resA"),rb=$("#resB");
    ra.innerHTML="";rb.innerHTML="";
    var tA=thinkBox(),tB=thinkBox();ra.appendChild(tA);rb.appendChild(tB);
    var body={a:a,b:b};var topic=$("#topic").value.trim();if(topic)body.prompt=topic;
    fetch(API,{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(body)})
      .then(function(r){return r.json();})
      .then(function(d){
        stopThink(tA);stopThink(tB);
        if(!d.ok){ra.innerHTML='<span class="err">'+(d.error||"error")+'</span>';rb.innerHTML="";reset(btn);return;}
        $("#topicShow").style.display="block";$("#topicShow").textContent="📋 "+d.prompt;
        renderRes(ra,"A",d.a);renderRes(rb,"B",d.b);
        reset(btn);
      })
      .catch(function(e){stopThink(tA);stopThink(tB);ra.innerHTML='<span class="err">Network error</span>';reset(btn);});
  }
  function reset(btn){btn.disabled=false;btn.textContent="⚔ Fight";}
  function renderRes(host,side,r){
    host.innerHTML="";
    var head=el("div",{"class":"res-head"});
    head.appendChild(el("div",{"class":"res-name"},r.label||"—"));
    host.appendChild(head);
    if(!r.ok){host.appendChild(el("div",{"class":"err"},r.error||"no output"));return;}
    if(r.type==="image"&&r.image){var img=el("img");img.src=r.image;host.appendChild(img);}
    else if(r.type==="html"&&r.html){var f=el("iframe",{sandbox:"allow-scripts"});host.appendChild(f);f.srcdoc=r.html;}
    else {host.appendChild(el("div",{"class":"out"},(r.output||"").replace(/</g,"&lt;")));}
    var v=el("button",{"class":"vote"},"▲ Vote winner");
    v.addEventListener("click",function(){
      document.querySelectorAll(".vote").forEach(function(x){x.classList.remove("win");x.textContent="▲ Vote winner";});
      v.classList.add("win");v.textContent="✓ Your pick (not saved yet)";
    });
    host.appendChild(v);
  }
})();
</script>
</body>
</html>
