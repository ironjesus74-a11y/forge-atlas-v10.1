name: Repo Guardian

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  guard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Collect changed files
        shell: bash
        run: |
          set -euo pipefail
          git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" > changed.txt
          sort -u changed.txt -o changed.txt
          echo "Changed files:"
          cat changed.txt

      - name: Sealed file guard
        shell: bash
        run: |
          set -euo pipefail

          if grep -Eq '^(public/js/emery\.js|public/css/emery\.css)$' changed.txt; then
            echo "Sealed file changed. Stop."
            exit 1
          fi

          echo "Sealed file guard passed."

      - name: Private relay and coordination guard
        shell: bash
        run: |
          set -euo pipefail

          if grep -Eq '(^|/)(ai-relay|private-docs|sealed|coordination)(/|$)' changed.txt; then
            echo "Private or coordination-only path found in public repo changes."
            exit 1
          fi

          echo "Private relay/coordination path guard passed."

      - name: Forbidden file guard
        shell: bash
        run: |
          set -euo pipefail

          BAD_PATTERNS=(
            ".env"
            ".env."
            ".mcp.json"
            ".cursor"
            ".vscode"
            ".zed"
            ".gemini"
            ".codex"
            "opencode.json"
            "id_rsa"
            ".pem"
          )

          for pattern in "${BAD_PATTERNS[@]}"; do
            if git ls-files | grep -q "$pattern"; then
              echo "Forbidden file tracked: $pattern"
              exit 1
            fi
          done

          echo "Forbidden file guard passed."

      - name: Secret literal scan
        shell: bash
        run: |
          set -euo pipefail

          hit=0

          while read -r f; do
            [ -f "$f" ] || continue

            case "$f" in
              public/js/emery.js|public/css/emery.css)
                continue
                ;;
            esac

            if grep -IqE '(ghp_[A-Za-z0-9_]{20,}|gho_[A-Za-z0-9_]{20,}|sk-ant-[A-Za-z0-9_-]{20,}|sk-proj-[A-Za-z0-9_-]{20,}|BEGIN PRIVATE KEY|CLOUDFLARE_API_TOKEN[[:space:]]*=[[:space:]]*["'\'']?[-A-Za-z0-9_]{20,}|ANTHROPIC_API_KEY[[:space:]]*=[[:space:]]*["'\'']?sk-|OPENAI_API_KEY[[:space:]]*=[[:space:]]*["'\'']?sk-|WEBHOOK_SECRET[[:space:]]*=[[:space:]]*["'\'']?[-A-Za-z0-9_]{16,})' "$f"; then
              echo "Possible secret literal found in: $f"
              hit=1
            fi
          done < changed.txt

          if [ "$hit" = "1" ]; then
            echo "Secret literal scan failed."
            exit 1
          fi

          echo "Secret literal scan passed."

      - name: JavaScript syntax check
        shell: bash
        run: |
          set -euo pipefail

          grep -E '\.js$' changed.txt | while read -r f; do
            [ -f "$f" ] || continue

            case "$f" in
              public/js/emery.js)
                continue
                ;;
            esac

            echo "node --check $f"
            node --check "$f"
          done || true

      - name: JSON validation
        shell: bash
        run: |
          set -euo pipefail

          grep -E '\.json$' changed.txt | while read -r f; do
            [ -f "$f" ] || continue
            echo "Checking JSON: $f"
            python3 -m json.tool "$f" >/dev/null
          done || true

      - name: Unsafe deploy automation guard
        shell: bash
        run: |
          set -euo pipefail

          hit=0

          while read -r f; do
            [ -f "$f" ] || continue

            if grep -IqE 'pull_request:|wrangler deploy|pages deploy|cloudflare deploy|production' "$f"; then
              if grep -IqE 'wrangler deploy|pages deploy|cloudflare deploy' "$f" && grep -Iq 'pull_request:' "$f"; then
                echo "Unsafe deploy pattern may exist in: $f"
                hit=1
              fi
            fi
          done < changed.txt

          if [ "$hit" = "1" ]; then
            echo "Deploy guard failed."
            exit 1
          fi

          echo "Deploy automation guard passed."

      - name: Honest stats warning
        shell: bash
        run: |
          set -euo pipefail

          while read -r f; do
            [ -f "$f" ] || continue

            case "$f" in
              public/js/emery.js|public/css/emery.css)
                continue
                ;;
            esac

            if grep -IqE '(live users|real users|real traffic|live traffic|real-time traffic|real analytics|actual visitors)' "$f"; then
              echo "::warning file=$f::Check real/live claims. Real stats need real sources. Demo data must be labeled."
            fi
          done < changed.txt

          echo "Honest stats warning check complete."

      - name: Done
        run: echo "Repo Guardian passed."
