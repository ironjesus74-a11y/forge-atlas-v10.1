name: Synthetic AI Monitor

on:
  schedule:
    - cron: "0 */6 * * *" # Runs every 6 hours automatically
  workflow_dispatch:

jobs:
  ping_ecosystem:
    runs-on: ubuntu-latest
    steps:
      - name: Send Synthetic Pulse to Cloudflare Edge
        run: |
          echo "Pinging AI Gateway to populate telemetry and warm cache..."
          curl -sS https://forge-atlas.io/api/ai-health || echo "Target unreachable."
          echo "Pulse complete."
